<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../../platforms/{{platform}}/assets/themes/{{theme}}.css" />
    <style>
        :root {
            --canvas-width: 1000px;
            --canvas-height: 1000px;
            --primary-color: #ff2442;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: var(--canvas-width);
            min-height: var(--canvas-height);
            display: flex;
            background: var(--bg-main, #000);
            color: white;
            overflow: visible;
        }

        .visual-engine {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            box-sizing: border-box;
        }

        .title:empty {
            display: none !important;
        }

        .motion-wrapper {
            border-left: 12px solid var(--primary-color);
            padding-left: 40px;
            padding-right: 40px;
        }

        .title {
            font-size: 80px;
            font-weight: 900;
            margin: 0;
            line-height: 1.1;
        }

        .quote {
            font-size: 34px;
            margin-top: 40px;
            opacity: 0.8;
            font-style: italic;
        }
    </style>
</head>

<body class="archetype-editorial" data-libs="gsap">
    <div class="visual-engine">
        <div class="motion-wrapper">
            <h1 class="title">{{title}}</h1>
            <div class="quote">
                {{blocks}}
            </div>
        </div>
    </div>
</body>

</html>
