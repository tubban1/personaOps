<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../../platforms/{{platform}}/assets/themes/{{theme}}.css" />
    <style>
        :root {
            --canvas-width: 1000px;
            --canvas-height: 1000px;
            --primary-color: #ff2442;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: var(--canvas-width);
            height: var(--canvas-height);
            display: flex;
            background: var(--bg-main, #fff);
        }

        .visual-engine {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            box-sizing: border-box;
            text-align: center;
        }

        .formula-hero {
            background: var(--primary-color);
            color: white;
            padding: 60px 40px;
            border-radius: var(--radius-lg, 24px);
            width: 100%;
            box-sizing: border-box;
            font-size: 64px;
            margin: 40px 0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 54px;
            font-weight: 800;
        }

        .summary {
            font-size: 30px;
            opacity: 0.8;
            max-width: 80%;
        }
    </style>
</head>

<body class="archetype-formula" data-libs="gsap,katex">
    <div class="visual-engine">
        <h1 class="title">{{title}}</h1>
        <div class="formula-hero">
            {{blocks}}
        </div>
        <p class="summary">{{summary}}</p>
    </div>
</body>

</html>
