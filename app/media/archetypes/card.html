<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../../platforms/{{platform}}/assets/themes/{{theme}}.css" />
    <style>
        :root {
            --canvas-width: 1000px;
            --canvas-height: 1000px;
            --card-padding: 60px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: var(--canvas-width);
            min-height: var(--canvas-height);
            background: var(--bg-main);
            font-family: var(--font-main, -apple-system, sans-serif);
            overflow: visible;
        }

        .visual-engine {
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--card-padding);
            box-sizing: border-box;
            color: var(--text-main, #333);
            position: relative;
            z-index: 10;
        }

        .title:empty,
        .summary:empty {
            display: none !important;
        }

        /* 标题区 */
        .title {
            font-size: var(--card-title-size, 64px);
            font-weight: 800;
            margin: 0 0 20px 0;
            color: var(--text-title, #000);
            line-height: 1.25;
            max-width: var(--card-max-line-width, 100%);
        }

        /* 摘要区 */
        .summary {
            font-size: var(--card-summary-size, 32px);
            line-height: 1.5;
            margin: 0 0 40px 0;
            opacity: 0.8;
            max-width: var(--card-max-line-width, 95%);
        }

        /* 核心正文区 */
        .main-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            font-size: var(--card-body-size, 32px);
            line-height: 1.6;
            max-width: var(--card-max-line-width, 100%);
        }

        /* 通用组件 */
        .block-quote {
            border-left: 8px solid var(--primary-color);
            padding: 10px 0 10px 30px;
            font-style: italic;
            background: var(--bg-surface, rgba(0, 0, 0, 0.03));
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }

        .block-stats {
            background: var(--bg-surface, rgba(0, 0, 0, 0.02));
            padding: 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stats-label {
            font-size: 24px;
            opacity: 0.6;
        }

        .stats-value {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .branding-footer {
            margin-top: 60px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            opacity: 0.5;
            font-weight: 600;
        }

        /* 装饰层 */
        #svgLayer,
        #d3Layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

<body class="archetype-card" data-libs="gsap,svg,rough">
    <svg id="svgLayer"></svg>
    <div class="visual-engine">
        <header style="margin-bottom: 40px; font-size: 24px; opacity: 0.5;">{{author_name}}</header>
        <article class="main-body">
            <h1 class="title">{{title}}</h1>
            <p class="summary">{{summary}}</p>
            <div class="blocks-container">
                {{blocks}}
            </div>
        </article>
        <footer class="branding-footer">
            <span>{{branding}}</span>
            <span>{{publish_date}}</span>
        </footer>
    </div>
</body>

</html>
