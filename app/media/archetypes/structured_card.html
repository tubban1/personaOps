<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../../platforms/{{platform}}/assets/themes/{{theme}}.css" />
    <style>
        :root {
            --canvas-width: 1000px;
            --canvas-height: 1000px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: var(--canvas-width);
            height: var(--canvas-height);
            background-color: var(--bg-main, #ffffff);
            font-family: var(--font-main, sans-serif);
            overflow: hidden;
        }

        .structured-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--content-padding, 60px);
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .header-group {
            margin-bottom: 30px;
        }

        .title {
            font-size: 56px;
            font-weight: 800;
            color: var(--text-title);
            margin: 0;
        }

        .summary {
            font-size: 28px;
            opacity: 0.7;
            margin: 12px 0 0 0;
            line-height: 1.4;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
            min-height: 0;
        }

        /* 结构图区 (Diagram / Formula Zone) */
        .visual-zone {
            flex: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-surface, rgba(0, 0, 0, 0.02));
            border-radius: 24px;
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 公式缩放 */
        .katex-display {
            font-size: var(--formula-scale, 1.2em);
        }

        /* Mermaid 节点适配 */
        .mermaid {
            transform: scale(var(--mermaid-scale, 1.1));
        }

        /* 解释文字区 */
        .explanation-zone {
            font-size: 28px;
            line-height: 1.6;
            color: var(--text-body);
            background: var(--bg-soft, rgba(0, 0, 0, 0.01));
            padding: 24px;
            border-radius: 12px;
            border-left: 6px solid var(--primary-color);
        }

        #svgLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .title:empty,
        .summary:empty,
        .explanation-zone:empty {
            display: none !important;
        }
    </style>
</head>

<body class="archetype-structured" data-libs="gsap,mermaid,katex,svg">
    <svg id="svgLayer"></svg>
    <div class="structured-container">
        <header class="header-group">
            <h1 class="title">{{title}}</h1>
            <p class="summary">{{summary}}</p>
        </header>

        <main class="main-stage">
            <div class="visual-zone">
                {{blocks}}
            </div>
            <div class="explanation-zone" id="explanationZone"></div>
        </main>

        <footer
            style="margin-top: 30px; font-size: 20px; opacity: 0.5; font-weight: 700; display: flex; justify-content: space-between;">
            <span>{{branding}} · STRUCTURED KNOWLEDGE</span>
            <span>INTELLECTUAL FRAMEWORK</span>
        </footer>
    </div>
</body>

</html>
