<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../../platforms/{{platform}}/assets/themes/{{theme}}.css" />
    <style>
        :root {
            --canvas-width: 1000px;
            --canvas-height: 1000px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: var(--canvas-width);
            height: var(--canvas-height);
            background-color: var(--bg-main, #fffdf5);
            font-family: var(--rough-body-font, var(--font-main, sans-serif));
            overflow: hidden;
        }

        .rough-engine {
            display: grid;
            grid-template-rows: 1fr 1.2fr;
            width: 100%;
            height: 100%;
        }

        /* 叙事区 (Narrative Zone) */
        .narrative-zone {
            padding: var(--content-padding, 80px);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            z-index: 10;
        }

        .title {
            font-family: var(--rough-title-font, var(--font-header, inherit));
            font-size: var(--rough-title-size, 100px);
            line-height: 1.1;
            font-weight: 900;
            color: var(--text-title);
            margin: 0 0 40px 0;
            letter-spacing: -2px;
        }

        .summary {
            font-size: var(--rough-body-size, 42px);
            line-height: 1.6;
            color: var(--text-body);
            max-width: 95%;
            margin: 0;
            opacity: 0.9;
        }

        /* 插画区 (Illustration Zone) */
        .illustration-zone {
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.02);
            margin: 0 60px 60px 60px;
            border-radius: 40px;
            border: 2px dashed rgba(0, 0, 0, 0.05);
        }

        #roughCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body class="archetype-rough-note" data-libs="gsap,rough">
    <canvas id="roughCanvas"></canvas>
    <div class="rough-engine">
        <div class="narrative-zone">
            <h1 class="title" id="pageTitle">{{title}}</h1>
            <p class="summary" id="pageSummary">{{summary}}</p>
        </div>
        <div class="illustration-zone" id="illustrationZone">
            <!-- 视觉元素将通过 ID 注入或在此区计算坐标 -->
        </div>
    </div>
</body>

</html>
