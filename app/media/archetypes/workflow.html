<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../../platforms/{{platform}}/assets/themes/{{theme}}.css" />
    <style>
        :root {
            --canvas-width: 1000px;
            --canvas-height: 1000px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: var(--canvas-width);
            height: var(--canvas-height);
            background-color: var(--bg-main, #ffffff);
            color: var(--text-body, #333);
            font-family: var(--font-body, "Inter", sans-serif);
            overflow: hidden;
        }

        .visual-engine {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--content-padding, 60px);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: var(--space-lg, 40px);
        }

        .title {
            font-size: var(--cover-title-size, 58px);
            font-weight: 900;
            color: var(--text-title, var(--primary-color));
            margin: 0 0 var(--space-sm, 20px) 0;
            letter-spacing: -0.01em;
        }

        .summary {
            font-size: var(--cover-summary-size, 32px);
            color: var(--text-body);
            opacity: 0.8;
            line-height: 1.5;
            max-width: 85%;
            margin: 0 auto;
        }

        .diagram-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-soft, rgba(0, 0, 0, 0.02));
            border-radius: var(--workflow-node-radius, var(--radius-lg, 32px));
            padding: var(--space-md, 30px);
            overflow: hidden;
            border: var(--stroke-decorative, none);
            box-shadow: var(--shadow-soft, none);
        }

        /* Mermaid 节点样式覆盖 (通过 CSS 注入) */
        .mermaid .node rect {
            fill: var(--workflow-node-bg, var(--bg-elevated, #fff)) !important;
            stroke: var(--workflow-line-color, var(--border-color, #eee)) !important;
            stroke-width: 2px !important;
        }

        .footer {
            margin-top: var(--space-lg, 40px);
            font-size: 24px;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }
    </style>
</head>

<body class="archetype-workflow" data-libs="gsap,mermaid">
    <div class="visual-engine">
        <header class="header">
            <h1 class="title">{{title}}</h1>
            <p class="summary">{{summary}}</p>
        </header>
        <main class="diagram-container">
            {{blocks}}
        </main>
        <footer class="footer">
            {{branding}} · Methodologies & Frameworks
        </footer>
    </div>
</body>

</html>
